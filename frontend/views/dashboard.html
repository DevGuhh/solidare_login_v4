<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Instituto Solidare - Dashboard</title>

    <!-- Bibliotecas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.2/jspdf.umd.min.js">
    </script>

    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/5.0.8/jspdf.plugin.autotable.min.js">
    </script>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <!-- CSS do sistema -->
    <link
        rel="stylesheet"
        href="../css/admin.css"
    >

    <link
        rel="stylesheet"
        href="../css/dashboard.css"
    >

    <link
        rel="stylesheet"
        href="../css/beneficiarios.css"
    >

    <link
        rel="stylesheet"
        href="../css/doacoes.css"
    >

    <link
        rel="stylesheet"
        href="../css/relatorios.css"
    >

    <link
        rel="stylesheet"
        href="../css/components/modal.css"
    >

    <link
        rel="stylesheet"
        href="../css/components/toast.css"
    >

    <link
        rel="stylesheet"
        href="../css/components/loading.css"
    >

</head>


<body>

    <div class="container">

        <!-- MENU LATERAL -->

        <aside>

            <div class="logo">

                <i class="fa-solid fa-heart fa-3x"></i>

                <h2>Solidare</h2>

            </div>


            <nav id="menuPrincipal">

                <a
                    href="#"
                    class="menu-link ativo"
                    data-pagina="home.html"
                    data-tooltip="Dashboard"
                    title="Dashboard"
                >
                    <i class="fa-solid fa-chart-line"></i>

                    <span>Dashboard</span>
                </a>


                <a
                    href="#"
                    class="menu-link"
                    data-pagina="beneficiarios.html"
                    data-tooltip="Beneficiários"
                    title="Beneficiários"
                >
                    <i class="fa-solid fa-users"></i>

                    <span>Beneficiários</span>
                </a>


                <a
                    href="#"
                    class="menu-link"
                    data-pagina="instituicoes.html"
                    data-tooltip="Instituições"
                    title="Instituições"
                >
                    <i class="fa-solid fa-building"></i>

                    <span>Instituições</span>
                </a>


                <a
                    href="#"
                    class="menu-link"
                    data-pagina="rfid.html"
                    data-tooltip="RFID"
                    title="RFID"
                >
                    <i class="fa-solid fa-id-card"></i>

                    <span>RFID</span>
                </a>


                <a
                    href="#"
                    class="menu-link"
                    data-pagina="doacoes.html"
                    data-tooltip="Doações"
                    title="Doações"
                >
                    <i class="fa-solid fa-hand-holding-heart"></i>

                    <span>Doações</span>
                </a>


                <a
                    href="#"
                    class="menu-link"
                    data-pagina="relatorios.html"
                    data-tooltip="Relatórios"
                    title="Relatórios"
                >
                    <i class="fa-solid fa-file-lines"></i>

                    <span>Relatórios</span>
                </a>

            </nav>

            <div class="sidebar-footer">

                <div class="sidebar-status">

                    <span
                        class="sidebar-status-indicador"
                        aria-hidden="true"
                    ></span>

                    <div class="sidebar-status-textos">

                        <strong>Sistema online</strong>

                        <span>Todos os serviços ativos</span>

                    </div>

                </div>

                <div class="sidebar-versao">

                    <i
                        class="fa-solid fa-code-branch"
                        aria-hidden="true"
                    ></i>

                    <span>Versão 1.0.0</span>

                </div>

            </div>

        </aside>


        <!-- ÁREA PRINCIPAL -->

        <div class="content">

            <header class="topbar">

                <div class="topbar-lado-esquerdo">

                    <button
                        id="btnAlternarMenu"
                        class="botao-alternar-menu"
                        type="button"
                        aria-label="Recolher menu lateral"
                        aria-expanded="true"
                        title="Recolher menu"
                    >
                        <i
                            class="fa-solid fa-bars"
                            aria-hidden="true"
                        ></i>
                    </button>


                    <div class="topbar-header">

                        <nav
                            class="breadcrumb"
                            aria-label="Navegação estrutural"
                        >
                            <button
                                id="breadcrumbInicio"
                                class="breadcrumb-inicio"
                                type="button"
                                title="Voltar ao Dashboard"
                            >
                                <i
                                    class="fa-solid fa-house"
                                    aria-hidden="true"
                                ></i>

                                Início
                            </button>


                            <i
                                class="fa-solid fa-chevron-right breadcrumb-separador"
                                aria-hidden="true"
                            ></i>


                            <span
                                id="breadcrumbPagina"
                                class="breadcrumb-atual"
                            >
                                Dashboard
                            </span>

                        </nav>


                        <h2
                            id="tituloPagina"
                            class="topbar-titulo"
                        >
                            Dashboard
                        </h2>


                        <p
                            id="descricaoPagina"
                            class="topbar-descricao"
                        >
                            Visão geral do sistema.
                        </p>

                    </div>

                </div>


                <div class="usuario">

                    <div class="usuario-avatar">

                        <i class="fa-solid fa-user"></i>

                    </div>


                    <div class="usuario-info">

                        <strong id="nomeUsuario">
                            Carregando...
                        </strong>

                        <span id="perfilUsuario">
                            Usuário
                        </span>

                        <small id="emailUsuario">
                            ...
                        </small>

                    </div>


                    <button
                        id="logout"
                        type="button"
                    >
                        <i class="fa-solid fa-right-from-bracket"></i>

                        Sair
                    </button>

                </div>

            </header>


            <main id="conteudo">

                <div class="carregando-pagina">

                    <i class="fa-solid fa-spinner fa-spin"></i>

                    &nbsp; Carregando painel...

                </div>

            </main>

        </div>

    </div>


    <script
        type="module"
        src="../js/router.js"
    ></script>

    <script
        type="module"
        src="../js/dashboard.js"
    ></script>

</body>

</html>
